services:
  # Peer 1: Primary Node
  peer-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialkube-peer-1
    ports:
      - "3001:3001"  # API Port
      - "4001:4001"  # P2P Port
    volumes:
      - ./data/peer1:/app/data
      - ./logs/peer1:/app/logs
      - /Users/benaidlin/.cache/huggingface:/root/.cache/huggingface:ro
    environment:
      - PORT=3001
      - P2P_PORT=4001
      - DATABASE_PATH=/app/data/ledger.db
      - HF_HOME=/root/.cache/huggingface
      - MODEL_PATH=/root/.cache/huggingface/hub/models--bartowski--Qwen2.5-Coder-3B-Instruct-GGUF/snapshots/7c137640ef0332dfedb229f2504c58d83ed4307a/Qwen2.5-Coder-3B-Instruct-Q4_K_M.gguf
    restart: always

  # Peer 2: Simulation Node
  peer-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialkube-peer-2
    ports:
      - "3002:3001"  # API mapped to 3002 locally
      - "4002:4002"  # P2P Port
    volumes:
      - ./data/peer2:/app/data
      - ./logs/peer2:/app/logs
      - /Users/benaidlin/.cache/huggingface:/root/.cache/huggingface:ro
    environment:
      - PORT=3001
      - P2P_PORT=4002
      - DATABASE_PATH=/app/data/ledger.db
      - HF_HOME=/root/.cache/huggingface
      - MODEL_PATH=/root/.cache/huggingface/hub/models--bartowski--Qwen2.5-Coder-3B-Instruct-GGUF/snapshots/7c137640ef0332dfedb229f2504c58d83ed4307a/Qwen2.5-Coder-3B-Instruct-Q4_K_M.gguf
    restart: always

  # UI for Peer 1
  ui-1:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: socialkube-ui-1
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - peer-1

  # UI for Peer 2
  ui-2:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: socialkube-ui-2
    ports:
      - "3010:3000" # Mapped to 3010 to avoid conflict with UI 1
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    depends_on:
      - peer-2

networks:
  default:
    name: socialkube-network
